name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend — build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - run: npm run lint
      - run: npm run build

  backend-format:
    name: Backend — black format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: uv sync --group dev
      - run: uv run black --check --target-version py313 .

  backend-tests:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - run: uv sync --group dev
      - run: uv run pytest tests/ -v

  docker-e2e:
    name: Docker — build, up, e2e, down
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend-format
      - backend-tests

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build Docker Compose services
        run: docker compose build

      - name: Start stack
        run: docker compose up -d --wait --timeout 120 postgres backend frontend demo-data

      - name: Run e2e tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3010
          E2E_API_URL: http://localhost:8010
        run: npx playwright test --reporter=line

      - name: Cleanup
        if: always()
        run: docker compose down -v