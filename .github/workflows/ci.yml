name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: nextjs-${{ hashFiles('frontend/package-lock.json') }}-
      - run: npm run lint
      - run: npm run build

  backend-format:
    name: Backend — black format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --group dev
      - run: uv run black --check --target-version py313 .

  backend-tests:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --group dev
      - run: uv run pytest tests/ -v

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: pay-tracker-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: pay-tracker-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
      - name: Save images to artifact
        run: docker save pay-tracker-backend:latest pay-tracker-frontend:latest -o images.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
          path: images.tar
          retention-days: 1  # fallback; cleanup job deletes it immediately after use

  docker:
    name: Docker — build, up, down
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
      - name: Load images
        run: docker load -i images.tar
      - name: Create .env from example
        run: cp .env.example .env
      - name: Start stack
        run: docker compose up -d --wait --timeout 120 postgres backend frontend demo-data
      - name: Tear down
        if: always()
        run: docker compose down -v

  e2e:
    name: Frontend — e2e tests
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ github.sha }}
      - name: Load images
        run: docker load -i images.tar
      - name: Create .env from example
        run: cp .env.example .env
      - name: Start stack
        run: docker compose up -d --wait --timeout 120 postgres backend frontend demo-data
      - name: Run e2e tests
        working-directory: frontend
        run: npx playwright test --reporter=line
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3010
          E2E_API_URL: http://localhost:8010
      - name: Tear down
        if: always()
        run: docker compose down -v

  cleanup:
    name: Delete image artifact
    needs: [docker, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const artifact = artifacts.data.artifacts.find(
              a => a.name === `docker-images-${context.sha}`
            );
            if (artifact) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }
