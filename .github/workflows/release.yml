name: Release

on:
  release:
    types: [published]

jobs:
  docker:
    name: Docker — build & push release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images with release version
        run: docker compose build
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}

      - name: Push images to GHCR
        run: |
          REPO=ghcr.io/${{ github.repository }}
          TAG=${{ github.ref_name }}
          docker tag pay-tracker-backend:latest ${REPO}-backend:${TAG}
          docker tag pay-tracker-frontend:latest ${REPO}-frontend:${TAG}
          docker push ${REPO}-backend:${TAG}
          docker push ${REPO}-frontend:${TAG}
