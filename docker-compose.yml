services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paytracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-paytracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paytracker}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-paytracker}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-paytracker}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8010:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
    container_name: frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - "3010:3000"

  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    container_name: e2e
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:3000
      E2E_API_URL: http://backend:8000
    restart: "no"

  demo-data:
    build: ./demo
    container_name: demo-data
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"
    environment:
      SEED_BASE_URL: "http://backend:8000"

volumes:
  postgres_data:
