services:
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/17/main
    ports:
      - "8010:8000"

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3010:3000"

volumes:
  postgres_data:
