services:
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/17/main
    ports:
      - "8010:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
    container_name: frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3010:3000"

volumes:
  postgres_data:
